                <div class="card-desc">${item.desc}</div>
                <div class="meta-row">
                    <span class="author">👤 ${item.author}</span>
                    <span class="meta-item">👍 ${formatCount(item.likes)}</span>
                    <span class="meta-item">⭐ ${formatCount(item.collects)}</span>
                </div>
                <a class="link-btn" href="${url}" target="_blank" rel="noopener">${btnText}</a>
            </div>
        `;
    }

    // ============================================================
    // 🏗️ 渲染小红书静态列
    // ============================================================
    function renderStaticColumn(platform, items) {
        const cfg = platformConfig[platform];
        if (!items || items.length === 0) {
            return `
                <div class="platform-col ${cfg.cssClass}">
                    <div class="platform-header">
                        <span class="platform-icon">${cfg.icon}</span>
                        <span class="platform-name">${cfg.name}</span>
                    </div>
                    <div class="no-result">暂无匹配内容</div>
                </div>
            `;
        }
        const cardsHTML = items.map(item => createCardHTML(item, platform)).join("");
        return `
            <div class="platform-col ${cfg.cssClass}">
                <div class="platform-header">
                    <span class="platform-icon">${cfg.icon}</span>
                    <span class="platform-name">${cfg.name}</span>
                </div>
                <div class="card-list">${cardsHTML}</div>
            </div>
        `;
    }

    // ============================================================
    // 📺 B站实时渲染（窗口切换：每次5条，共50条）
    // ============================================================
    const BILI_PAGE_SIZE = 5;

    let biliState = {
        keyword: '',
        offset: 0,
        loading: false,
        allVideos: [],
    };

    function getBiliWindowVideos() {
        return biliState.allVideos.slice(biliState.offset, biliState.offset + BILI_PAGE_SIZE);
    }

    function renderBilibiliColumn() {
        const cfg = platformConfig.bilibili;
        const grid = document.getElementById("platformGrid");
        let col = document.getElementById("bili-column");

        if (!col) {
            const html = `
                <div class="platform-col ${cfg.cssClass}" id="bili-column">
                    <div class="platform-header">
                        <span class="platform-icon">${cfg.icon}</span>
                        <span class="platform-name">${cfg.name}</span>
                        <button class="refresh-btn" id="bili-refresh" title="换一批">🔄</button>
                    </div>
                    <div class="card-list" id="bili-list"></div>
                    <div class="bili-pager" id="bili-pager"></div>
                    <div class="loading-more" id="bili-loading" style="display:none">
                        <span class="loading-spinner"></span>加载中...
                    </div>
                </div>
            `;
            if (grid.children.length >= 2) {
                grid.insertAdjacentHTML('beforeend', html);
            } else {
                grid.insertAdjacentHTML('afterbegin', html);
            }
            col = document.getElementById("bili-column");
            document.getElementById("bili-refresh").addEventListener('click', handleBiliRefresh);
        }

        const list = document.getElementById("bili-list");
        const pager = document.getElementById("bili-pager");
        const videos = getBiliWindowVideos();
        const cardsHTML = videos.map(item => createCardHTML(item, 'bilibili')).join("");
        list.innerHTML = cardsHTML || '<div class="no-result">暂无结果</div>';

        if (biliState.allVideos.length > 0) {
            const start = biliState.offset + 1;
            const end = Math.min(biliState.offset + BILI_PAGE_SIZE, biliState.allVideos.length);
            pager.innerHTML = `<span style="font-size:0.75rem;color:#6f8a9b;text-align:center;display:block;padding:8px 0;">第 ${start}-${end} 条 / 共 ${biliState.allVideos.length} 条（按点赞排序）</span>`;
        } else {
            pager.innerHTML = '';
        }
    }

    async function fetchBilibiliVideos(keyword) {
        const res = await fetch(`${API_BASE}/api/bilibili/search?keyword=${encodeURIComponent(keyword)}&_t=${Date.now()}`);
        if (!res.ok) throw new Error('fetch failed');
        return res.json();
    }

    function showBiliError(msg) {
        const list = document.getElementById("bili-list");
        if (list) {
            list.innerHTML = `<div class="no-result" style="color:#e05a5a">⚠️ ${msg}</div>`;
        }
    }

    async function loadBilibiliData() {
        if (biliState.loading) return;
        biliState.loading = true;
        document.getElementById("bili-loading").style.display = "block";
        const refreshBtn = document.getElementById("bili-refresh");
        if (refreshBtn) refreshBtn.classList.add("spinning");

        try {
            console.log('[B站] 请求 keyword=', biliState.keyword);
            const data = await fetchBilibiliVideos(biliState.keyword);
            console.log('[B站] 返回', data.videos.length, '条');
            biliState.allVideos = data.videos;
            biliState.offset = 0;
            renderBilibiliColumn();
        } catch (e) {
            console.error('[B站] 加载失败:', e);
            showBiliError('加载失败，请检查后端服务是否运行 (' + e.message + ')');
        } finally {
            biliState.loading = false;
            document.getElementById("bili-loading").style.display = "none";
            if (refreshBtn) refreshBtn.classList.remove("spinning");
        }
    }

    function handleBiliRefresh() {
        if (biliState.loading) return;
        const nextOffset = biliState.offset + BILI_PAGE_SIZE;
        if (nextOffset >= biliState.allVideos.length) {
            // 已看完，重新请求API
            loadBilibiliData();
        } else {
            // 显示下一批
            biliState.offset = nextOffset;
            renderBilibiliColumn();
        }
    }

    // ============================================================
    // 🎯 模糊搜索
    // ============================================================
    function findMatchingTopic(query) {
        const q = query.trim().toLowerCase();
        if (!q) return null;
        const keys = Object.keys(topicDatabase);
        for (const key of keys) if (key.toLowerCase() === q) return key;
        for (const key of keys) if (key.toLowerCase().includes(q)) return key;
        for (const key of keys) {
            if (q.includes("英语") && key.includes("英语")) return key;
            if (q.includes("口语") && key.includes("口语")) return key;
            if (q.includes("健身") && key.includes("健身")) return key;
            if (q.includes("减脂") && key.includes("减脂")) return key;
            if (q.includes("减肥") && key.includes("减脂")) return key;
            if (q.includes("穿搭") && key.includes("穿搭")) return key;
            if (q.includes("穿") && key.includes("穿搭")) return key;
            if (q.includes("美妆") && key.includes("美妆")) return key;
            if (q.includes("化妆") && key.includes("美妆")) return key;
            if (q.includes("ai") && key.toLowerCase().includes("ai")) return key;
            if (q.includes("AI") && key.includes("AI")) return key;
            if (q.includes("面试") && key.includes("面试")) return key;
            if (q.includes("求职") && key.includes("面试")) return key;
            if (q.includes("简历") && key.includes("面试")) return key;
        }
        return null;
    }

    // ============================================================
    // 🤖 AI学习助手列
    // ============================================================
    const AI_MODELS = [
        { id: 'zhipu', name: '智谱 GLM-4-Flash', desc: '永久免费 · 中文强' },
        { id: 'siliconflow', name: '硅基 DeepSeek-V3', desc: '1000 RPM · 推理强' },
        { id: 'kimi', name: 'Kimi K2.5', desc: '256K上下文 · 长文本' },
        { id: 'openrouter', name: 'OpenRouter', desc: '多模型聚合 · 免费额度' },
    ];

    let aiState = {
        selectedModel: 'zhipu',
        loading: false,
        result: null,
    };

    function renderAIColumn() {
        const cfg = platformConfig.ai;
        const grid = document.getElementById("platformGrid");
        let col = document.getElementById("ai-column");

        if (!col) {
            const modelOptions = AI_MODELS.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
            const html = `
                <div class="platform-col ${cfg.cssClass}" id="ai-column">
                    <div class="platform-header">
                        <span class="platform-icon">${cfg.icon}</span>
                        <span class="platform-name">${cfg.name}</span>
                        <select class="model-select" id="ai-model-select" title="切换AI模型">
                            ${modelOptions}
                        </select>
                    </div>
                    <div class="ai-input-area">
                        <textarea id="ai-prompt" placeholder="输入你想学习的技能，如：英语口语、Python编程、摄影..." rows="2"></textarea>
                        <button id="ai-generate-btn" class="ai-generate-btn">✨ 生成学习路径</button>
                    </div>
                    <div class="ai-result" id="ai-result"></div>
                    <div class="loading-more" id="ai-loading" style="display:none">
                        <span class="loading-spinner"></span>AI思考中...
                    </div>
                </div>
            `;
            if (grid.children.length >= 2) {
                grid.insertAdjacentHTML('beforeend', html);
            } else {
                grid.insertAdjacentHTML('afterbegin', html);
            }
            col = document.getElementById("ai-column");
            document.getElementById("ai-model-select").addEventListener('change', handleModelChange);
            document.getElementById("ai-generate-btn").addEventListener('click', handleAIGenerate);
            document.getElementById("ai-prompt").addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleAIGenerate();
                }
            });
        }
    }

    function handleModelChange(e) {
        aiState.selectedModel = e.target.value;
    }

    async function handleAIGenerate() {
        const promptEl = document.getElementById("ai-prompt");
        const resultEl = document.getElementById("ai-result");
        const loadingEl = document.getElementById("ai-loading");
        const topic = promptEl.value.trim();

        if (!topic) {
            resultEl.innerHTML = '<div class="no-result">请先输入你想学习的技能</div>';
            return;
        }

        aiState.loading = true;
        loadingEl.style.display = 'block';
        resultEl.innerHTML = '';

        try {
            const res = await fetch(`${API_BASE}/api/ai/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: aiState.selectedModel, topic })
            });
            if (!res.ok) throw new Error('API请求失败');
            const data = await res.json();
            renderAIResult(data.content);
        } catch (e) {
            resultEl.innerHTML = `<div class="no-result" style="color:#e05a5a">⚠️ ${e.message}</div>`;
        } finally {
            aiState.loading = false;
            loadingEl.style.display = 'none';
        }
    }

    function renderAIResult(content) {
        const resultEl = document.getElementById("ai-result");
        // 将markdown格式的内容转为HTML展示
        const html = content
            .replace(/## (.*)/g, '<h3 style="color:#8b5cf6;margin:16px 0 8px;font-size:1rem;">$1</h3>')
            .replace(/### (.*)/g, '<h4 style="color:#6b4ce6;margin:12px 0 6px;font-size:0.9rem;">$1</h4>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\* (.*)/g, '<li style="margin:4px 0;padding-left:8px;">$1</li>')
            .replace(/(\d+)\. (.*)/g, '<li style="margin:4px 0;padding-left:8px;"><strong>$1.</strong> $2</li>')
            .replace(/\n/g, '<br>');
        resultEl.innerHTML = `<div class="ai-result-content" style="background:#f8f7ff;border-radius:12px;padding:16px;font-size:0.85rem;line-height:1.6;color:#1a2c3e;">${html}</div>`;
    }

    // ============================================================
    // 🖥️ 整体渲染
    // ============================================================
    function renderAll(topicKey, rawQuery) {
        const grid = document.getElementById("platformGrid");
        const suggestionBox = document.getElementById("suggestionBox");
        grid.innerHTML = "";
        suggestionBox.innerHTML = "";

        // 小红书列
        let xhsItems = [];
        if (topicKey && topicDatabase[topicKey]) {
            xhsItems = topicDatabase[topicKey].xiaohongshu;
        }
        grid.insertAdjacentHTML('beforeend', renderStaticColumn('xiaohongshu', xhsItems));

        // B站列（实时加载）
        const keyword = rawQuery || topicKey || '';
        biliState = { keyword, offset: 0, loading: false, allVideos: [] };
        renderBilibiliColumn();
        if (keyword) loadBilibiliData();

        // AI学习助手列
        renderAIColumn();
        if (keyword) {
            document.getElementById("ai-prompt").value = keyword;
        }

        // 未匹配到主题时显示建议
        if (!topicKey && !rawQuery) {
            const suggestions = Object.keys(topicDatabase);
            suggestionBox.innerHTML = `
                💡 热门话题：${suggestions.map(s => `<span class="topic-tag" data-topic="${s}" style="cursor:pointer;margin:4px;">${s}</span>`).join(" ")}
            `;
            suggestionBox.querySelectorAll(".topic-tag").forEach(tag => {
                tag.addEventListener("click", function() {
                    const topic = this.getAttribute("data-topic");
                    document.getElementById("searchInput").value = topic;
                    performSearch();
                });
            });
        }
    }

    // ============================================================
    // 🚀 执行搜索
    // ============================================================
    function performSearch() {
        const query = document.getElementById("searchInput").value.trim();
        const topicKey = findMatchingTopic(query);
        renderAll(topicKey, query);
    }

    // ============================================================
    // 🎬 初始化
    // ============================================================
    function init() {
        document.getElementById("searchBtn").addEventListener("click", performSearch);
        document.getElementById("searchInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") performSearch();
        });
        document.querySelectorAll("#topicTags .topic-tag").forEach(tag => {
            tag.addEventListener("click", function() {
                const topic = this.getAttribute("data-topic");
                document.getElementById("searchInput").value = topic;
                performSearch();
            });
        });
        renderAll(null, '');
    }

    document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>

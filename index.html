    // ============================================================
    // 🎯 平台配置
    // ============================================================
    const platformConfig = {
        xiaohongshu: { name: "小红书", icon: "📕", cssClass: "xhs", key: "xiaohongshu" },
        bilibili: { name: "B站", icon: "📺", cssClass: "bili", key: "bilibili" },
        douyin: { name: "抖音", icon: "🎵", cssClass: "douyin", key: "douyin" }
    };

    // ============================================================
    // 🔍 格式化数字
    // ============================================================
    function formatCount(num) {
        if (num >= 10000) return (num / 10000).toFixed(1) + "w";
        return num.toString();
    }

    // ============================================================
    // 🔗 根据平台+标题生成搜索链接（小红书/抖音无法获取真实链接时使用）
    // ============================================================
    function buildSearchUrl(platform, title) {
        const keyword = encodeURIComponent(title.split('｜')[0].trim());
        if (platform === 'xiaohongshu') {
            return `https://www.xiaohongshu.com/search_result?keyword=${keyword}`;
        }
        if (platform === 'douyin') {
            return `https://www.douyin.com/search/${keyword}`;
        }
        return '#';
    }

    // ============================================================
    // 🖼️ 生成卡片 HTML
    // ============================================================
    function createCardHTML(item, platform) {
        // B站使用真实链接；小红书/抖音使用搜索链接（平台反爬限制无法获取具体笔记/视频链接）
        const url = (platform === 'bilibili') ? item.url : buildSearchUrl(platform, item.title);
        const btnText = platform === 'bilibili' ? '🔗 查看原文 →' : '🔍 去搜索 →';
        return `
            <div class="resource-card">
                <div class="card-title">
                    <span class="placeholder-img">📄</span>
                    <span class="title-text">${item.title}</span>
                </div>
                <div class="card-desc">${item.desc}</div>
                <div class="meta-row">
                    <span class="author">👤 ${item.author}</span>
                    <span class="meta-item">👍 ${formatCount(item.likes)}</span>
                    <span class="meta-item">⭐ ${formatCount(item.collects)}</span>
                </div>
                <a class="link-btn" href="${url}" target="_blank" rel="noopener">${btnText}</a>
            </div>
        `;
    }



    // ============================================================
    // 🏗️ 渲染平台列
    // ============================================================
    function renderPlatformColumn(platform, items) {
        const cfg = platformConfig[platform];
        if (!items || items.length === 0) {
            return `
                <div class="platform-col ${cfg.cssClass}">
                    <div class="platform-header">
                        <span class="platform-icon">${cfg.icon}</span>
                        <span class="platform-name">${cfg.name}</span>
                    </div>
                    <div class="no-result">暂无匹配内容</div>
                </div>
            `;
        }
        const cardsHTML = items.map(item => createCardHTML(item, platform)).join("");
        return `
            <div class="platform-col ${cfg.cssClass}">
                <div class="platform-header">
                    <span class="platform-icon">${cfg.icon}</span>
                    <span class="platform-name">${cfg.name}</span>
                </div>
                <div class="card-list">${cardsHTML}</div>
            </div>
        `;
    }

    // ============================================================
    // 🎯 模糊搜索：根据输入匹配 topicDatabase 的 key
    // ============================================================
    function findMatchingTopic(query) {
        const q = query.trim().toLowerCase();
        if (!q) return null;
        const keys = Object.keys(topicDatabase);
        // 精确匹配优先
        for (const key of keys) {
            if (key.toLowerCase() === q) return key;
        }
        // 包含匹配
        for (const key of keys) {
            if (key.toLowerCase().includes(q)) return key;
        }
        // 关键词交叉匹配
        for (const key of keys) {
            if (q.includes("英语") && key.includes("英语")) return key;
            if (q.includes("口语") && key.includes("口语")) return key;
            if (q.includes("健身") && key.includes("健身")) return key;
            if (q.includes("减脂") && key.includes("减脂")) return key;
            if (q.includes("减肥") && key.includes("减脂")) return key;
            if (q.includes("穿搭") && key.includes("穿搭")) return key;
            if (q.includes("穿") && key.includes("穿搭")) return key;
            if (q.includes("美妆") && key.includes("美妆")) return key;
            if (q.includes("化妆") && key.includes("美妆")) return key;
            if (q.includes("ai") && key.toLowerCase().includes("ai")) return key;
            if (q.includes("AI") && key.includes("AI")) return key;
            if (q.includes("面试") && key.includes("面试")) return key;
            if (q.includes("求职") && key.includes("面试")) return key;
            if (q.includes("简历") && key.includes("面试")) return key;
        }
        return null;
    }

    // ============================================================
    // 📋 获取建议话题列表
    // ============================================================
    function getSuggestions() {
        return Object.keys(topicDatabase);
    }

    // ============================================================
    // 🖥️ 整体渲染
    // ============================================================
    function renderAll(topicKey) {
        const grid = document.getElementById("platformGrid");
        const suggestionBox = document.getElementById("suggestionBox");

        if (!topicKey || !topicDatabase[topicKey]) {
            // 没有匹配到，显示建议
            grid.innerHTML = "";
            const suggestions = getSuggestions();
            suggestionBox.innerHTML = `
                🔔 未找到匹配主题，试试以下话题：
                ${suggestions.map(s => `<span class="topic-tag" data-topic="${s}" style="cursor:pointer;margin:4px;">${s}</span>`).join(" ")}
            `;
            // 给建议标签绑定点击
            suggestionBox.querySelectorAll(".topic-tag").forEach(tag => {
                tag.addEventListener("click", function() {
                    const topic = this.getAttribute("data-topic");
                    document.getElementById("searchInput").value = topic;
                    performSearch();
                });
            });
            return;
        }

        const data = topicDatabase[topicKey];
        const platforms = ["xiaohongshu", "bilibili", "douyin"];
        let html = "";
        platforms.forEach(p => {
            html += renderPlatformColumn(p, data[p]);
        });
        grid.innerHTML = html;
        suggestionBox.innerHTML = "";

    }

    // ============================================================
    // 🚀 执行搜索
    // ============================================================
    function performSearch() {
        const query = document.getElementById("searchInput").value;
        const topicKey = findMatchingTopic(query);
        renderAll(topicKey);
    }

    // ============================================================
    // 🎬 初始化 & 事件绑定
    // ============================================================
    function init() {
        // 搜索按钮点击
        document.getElementById("searchBtn").addEventListener("click", performSearch);

        // 回车键搜索
        document.getElementById("searchInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") performSearch();
        });

        // 话题标签点击
        document.querySelectorAll("#topicTags .topic-tag").forEach(tag => {
            tag.addEventListener("click", function() {
                const topic = this.getAttribute("data-topic");
                document.getElementById("searchInput").value = topic;
                performSearch();
            });
        });

        // 默认显示全部（显示第一个主题作为示例）
        renderAll(null);
        const suggestions = getSuggestions();
        document.getElementById("suggestionBox").innerHTML = `
            💡 热门话题：${suggestions.map(s => `<span class="topic-tag" data-topic="${s}" style="cursor:pointer;margin:4px;">${s}</span>`).join(" ")}
        `;
        document.querySelectorAll("#suggestionBox .topic-tag").forEach(tag => {
            tag.addEventListener("click", function() {
                const topic = this.getAttribute("data-topic");
                document.getElementById("searchInput").value = topic;
                performSearch();
            });
        });
    }

    // 页面加载完成后初始化
    document.addEventListener("DOMContentLoaded", init);
</script>
